# 看門狗設定（被 watchdog.sh source；install-watchdog.sh 會自動補 CLAUDE_BIN）
# 心跳逾期門檻（秒）：state 檔 updated_at 且 session transcript 都超過此時長沒動才視為斷線
STALE_SECONDS=1200
# 同一任務自動復活上限，超過後只留 log 等人工處理
MAX_RESTART=3
# 無頭復活的權限旗標。預設全自動（--dangerously-skip-permissions）：復活絕不卡在權限提示，
# 但復活的 session 在無人監督下擁有完整權限——風險說明見 README「安全警示」。
# 想保守一點改為空值 + settings.json permissions.allow 白名單:
#   PERMISSION_FLAGS=""
PERMISSION_FLAGS="--dangerously-skip-permissions"
# done 任務的 state / handoff / questions 檔保留天數
DONE_RETENTION_DAYS=7
# CLAUDE_BIN 由 install-watchdog.sh 依本機 `command -v claude` 自動寫入，不必手動填
